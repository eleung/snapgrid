name: Release

on:
  push:
    branches: [main]

# Only one release run at a time.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the "Version Packages" PR / tags
  pull-requests: write # open/update that PR
  id-token: write # npm provenance (trusted publishing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # `changeset publish` does the actual publish by shelling out to `npm`
      # (NOT pnpm), and npm only gained OIDC trusted-publishing support in
      # 11.5.1. The npm bundled with Node 22 is 10.9.x, which silently ignores
      # OIDC, PUTs to the registry with no credential, and npm masks the
      # unauthorized write to an existing scoped package as `E404 Not Found`.
      # Pin a current npm so trusted publishing actually happens.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.16.0

      - run: pnpm install --frozen-lockfile

      # `pnpm version-packages` re-renders the OG + GitHub social cards so their
      # version pill tracks the bump (and `check:og` passes on the Version Packages
      # PR). That render needs headless Chromium + ffmpeg. Only the version step
      # uses these; the publish step ignores them. A transient render flake fails
      # the job — just re-run it.
      - name: Install card-render deps (Chromium + ffmpeg)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pnpm --filter @snapgridjs/docs exec playwright install --with-deps chromium

      # When changesets are present this opens/updates a "Version Packages" PR.
      # When that PR merges (versions already bumped), it runs `pnpm release`,
      # which builds and publishes the changed packages to npm.
      #
      # Auth is npm trusted publishing (OIDC): pnpm exchanges the job's id-token
      # (permissions.id-token: write) for a short-lived credential, so there is
      # NO NPM_TOKEN. Each @snapgridjs/* package has a trusted publisher set for
      # this repo + workflow (with "disallow tokens" publishing access). See
      # RELEASING.md.
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — npm auth is via OIDC trusted publishing (see above).
          NPM_CONFIG_PROVENANCE: "true"
